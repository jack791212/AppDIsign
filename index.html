<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07060d">
<title>暗影獵手 ARPG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="game"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="topbar">
    <span class="pill"><span id="lvPill">Lv 1</span> · <span id="areaName">城鎮</span></span>
    <span class="pill" id="coins">🪙 0</span>
  </div>
  <div id="hpwrap">
    <div id="hpbar-bg" class="barbg"><div id="hpbar"></div></div>
    <div id="xpbar-bg" class="barbg"><div id="xpbar"></div></div>
  </div>
</div>

<!-- 側邊按鈕 -->
<div id="sidebtns">
  <div class="iconbtn" id="muteBtn">🔊</div>
  <div class="iconbtn" id="shopBtn" style="display:none">🏪</div>
  <div class="iconbtn" id="recallBtn">🏠</div>
  <div class="iconbtn" id="qiBtn">🌀<span class="badge" id="qiBadge" style="display:none">0</span></div>
  <div class="iconbtn" id="talBtn">🌳<span class="badge" id="talBadge" style="display:none">0</span></div>
  <div class="iconbtn" id="bagBtn">🎒<span class="badge" id="bagBadge" style="display:none">0</span></div>
</div>

<!-- 主動技能按鈕 -->
<div id="skillBtns">
  <div class="skillbtn" id="dashBtn">⚡<div class="cd" id="dashCd"></div></div>
  <div class="skillbtn ult" id="ultBtn">💥<div class="cd" id="ultCd"></div></div>
</div>

<!-- 傳送門提示 -->
<div id="portalPrompt"></div>

<!-- Toast -->
<div id="toasts"></div>

<!-- 背包面板 -->
<div class="panel" id="bagPanel">
  <div class="head">
    <h2>🎒 裝備 / 背包</h2>
    <button class="closebtn" id="bagClose">✕</button>
  </div>
  <div style="font-size:13px;color:#9b8fc0;margin-bottom:6px">點擊裝備欄卸下、點背包道具裝備或賣出</div>
  <div id="equipRow"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="font-size:14px;color:#9b8fc0">背包</span>
    <span id="bagGold" style="font-size:14px;font-weight:700">🪙 0</span>
  </div>
  <div id="bagSellRow">
    <button class="sellbtn" data-r="0">賣普通</button>
    <button class="sellbtn" data-r="1">賣 ≤魔法</button>
    <button class="sellbtn" data-r="2">賣 ≤稀有</button>
    <button class="sellbtn" data-r="all" style="color:#ff9bb0;border-color:#ff6b8a">賣全部</button>
  </div>
  <div class="scroll"><div id="bagGrid"></div></div>
</div>

<!-- 功法面板 -->
<div class="panel" id="qiPanel">
  <div class="head">
    <h2>🌀 功法</h2>
    <button class="closebtn" id="qiClose">✕</button>
  </div>
  <div id="qiPts" style="text-align:center;font-size:14px;font-weight:700;color:#7af5d0;margin-bottom:8px">可用功法點：0</div>
  <div class="scroll"><div id="qiCols"></div></div>
</div>

<!-- 天賦面板 -->
<div class="panel" id="talPanel">
  <div class="head">
    <h2>🌳 天賦</h2>
    <button class="closebtn" id="talClose">✕</button>
  </div>
  <div id="talPts" style="text-align:center;font-size:15px;font-weight:700;color:#7af5d0;margin-bottom:10px">可用天賦點：0</div>
  <div class="scroll"><div id="talCols"></div></div>
</div>

<!-- 城鎮商店（鐵匠：強化 / 賭裝，依進入模式顯示） -->
<div class="panel" id="shopPanel">
  <div class="head">
    <h2 id="shopTitle">🔨 鐵匠</h2>
    <button class="closebtn" id="shopClose">✕</button>
  </div>
  <div style="text-align:right;font-weight:700;margin-bottom:8px" id="shopGold">🪙 0</div>
  <div class="scroll"><div id="shopBody"></div></div>
</div>

<!-- 道具彈窗 -->
<div id="itemPop"><div class="itemcard" id="itemCard"></div></div>

<!-- 強化確認彈窗 -->
<div id="enhPop"><div class="itemcard" id="enhCard"></div></div>

<!-- 對話 / 劇情 -->
<div class="panel" id="dlgPanel">
  <div style="flex:1" id="dlgSpacer"></div>
  <div id="dlgBox">
    <div id="dlgHead"><span id="dlgIc">🧑</span><span id="dlgName"></span></div>
    <div id="dlgText"></div>
    <div id="dlgHint">▼ 點擊繼續</div>
    <div id="dlgOptions"></div>
  </div>
</div>

<!-- 開始畫面 -->
<div class="overlay show" id="startScreen">
  <h1>🏹 暗影獵手</h1>
  <p id="startSub">拖曳移動、自動射箭。專注走位閃避，打怪掉裝，靠詞條特效打造你的 Build！</p>
  <button class="btn" id="startBtn">開始冒險</button>
  <div class="muted" id="ctrlToggle" style="cursor:pointer;text-decoration:underline">操作方式：📱 手機觸控（點擊切換）</div>
  <div class="muted" id="resetSave" style="cursor:pointer;text-decoration:underline">清除存檔重新開始</div>
</div>

<!-- 死亡畫面 -->
<div class="overlay" id="deathScreen">
  <h1>💀 你倒下了</h1>
  <p id="deathMsg">等級、裝備與戰利品都會保留。回到城鎮重整旗鼓吧！</p>
  <button class="btn" id="respawnBtn">回到城鎮</button>
</div>

<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/systems.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
</body>
</html>
